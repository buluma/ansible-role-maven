---
- name: Prepare
  hosts: all
  become: true
  gather_facts: false
  roles:
    - role: buluma.bootstrap
    - role: buluma.core_dependencies
    - role: buluma.buildtools
    - java_vendor: openjdk
      java_version: "11"
      role: buluma.java
  vars:
    - java_type: jdk
    - java_version: "8"
