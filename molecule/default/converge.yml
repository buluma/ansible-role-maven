---
- name: Converge
  hosts: all
  become: true
  gather_facts: true
  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
      changed_when: false
      when: ansible_facts['pkg_mgr'] in ('apt')
    - name: Install a jdk (apt)
      ansible.builtin.apt:
        name: default-jdk
        state: present
      become: true
      when: ansible_facts['pkg_mgr'] in ('apt')
    - name: Install a jdk (dnf, yum)
      ansible.builtin.package:
        name: java-latest-openjdk-devel
        state: present
      become: true
      when: ansible_facts['pkg_mgr'] in ('dnf', 'dnf5', 'yum')
  roles:
    - maven_install_dir: /opt/maven
      maven_version: 3.9.6
      role: buluma.maven
    - maven_fact_group_name: maven_3_3
      maven_is_default_installation: false
      maven_version: 3.3.9
      role: buluma.maven
